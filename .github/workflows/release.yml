name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build-linux-x86_64:
    name: Build Linux x86_64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build release binaries
        run: |
          cargo build --release
          cargo build --release --features daemon --bin virtuoso-daemon

      - name: Package binaries
        env:
          TAG: ${{ github.ref_name }}
        run: |
          mkdir -p dist
          cp target/release/vcli              dist/vcli-${TAG}-linux-x86_64
          cp target/release/vtui              dist/vtui-${TAG}-linux-x86_64
          cp target/release/virtuoso-daemon   dist/virtuoso-daemon-${TAG}-linux-x86_64
          chmod +x dist/*

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          body: |
            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.

  build-linux-aarch64:
    name: Build Linux aarch64 (daemon only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - name: Install aarch64 cross toolchain
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Build virtuoso-daemon for aarch64
        run: cargo build --release --features daemon --bin virtuoso-daemon --target aarch64-unknown-linux-gnu
      - name: Package daemon
        env:
          TAG: ${{ github.ref_name }}
        run: |
          mkdir -p dist
          cp target/aarch64-unknown-linux-gnu/release/virtuoso-daemon dist/virtuoso-daemon-${TAG}-linux-aarch64
          chmod +x dist/*
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/virtuoso-daemon-${{ github.ref_name }}-linux-aarch64

  publish-crate:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: [build-linux-x86_64, build-linux-aarch64]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ -z "$CARGO_REGISTRY_TOKEN" ]; then
            echo "CARGO_REGISTRY_TOKEN not set — skipping crates.io publish"
            exit 0
          fi
          if cargo publish 2>&1 | tee /tmp/pub_out.txt; then
            echo "Published successfully"
          elif grep -q "already exists" /tmp/pub_out.txt; then
            echo "Version already published — skipping"
          else
            exit 1
          fi
