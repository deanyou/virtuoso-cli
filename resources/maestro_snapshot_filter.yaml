# Maestro Run Artifact Snapshot Filter
# Controls which files are pulled from a Maestro run directory during snapshot.
# Format: glob patterns per file type category.
# Lines starting with # are comments.
# Empty lines are ignored.

# ── Session Setup Files ──────────────────────────────────────────
# Always pull the session definition files
always:
  - maestro.sdb
  - active.state

# ── XML-parsed Setup State ───────────────────────────────────────
# These are filtered/pretty-printed from the raw Cadence files
state:
  - state_from_sdb.xml
  - state_from_active_state.xml

# ── SKILL-probed Summary ──────────────────────────────────────────
# Generated by maestro setup probe
skill_summary:
  - state_from_skill.txt

# ── Per-run Log Files ────────────────────────────────────────────
# *.log, *.rdb (SQLite), *.msg.db are always relevant for debugging
run_level:
  - "*.log"
  - "*.rdb"
  - "*.msg.db"

# ── Netlist Files (per point/test) ──────────────────────────────
# The 4 files that actually describe the design:
# main SPICE netlist, testbench top level, FOM definitions, corner label
netlist:
  - "netlist/input.scs"
  - "netlist/netlist"
  - "netlist/qpInformation.ils"
  - "netlist/paramInfo.ils"

# ── PSF Output Files ─────────────────────────────────────────────
# stdout + logs + non-binary analysis results
psf:
  - spectre.out
  - logFile
  - "*.dc"
  - "*.ac"
  - "*.tran"
  - "*.noise"
  - "*.sp"
  - "*.fb"
  - "*.ft"
  - "*.sw"
  - "*.sh"

# ── Binary Waveforms (EXCLUDED) ──────────────────────────────────
# Binary waveforms must be read via maeOpenResults, not copied
exclude:
  - "*.raw"
  - "*/wavedb/*"
  - "*/psf/*.raw"
